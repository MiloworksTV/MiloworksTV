slug: day-002-shadows
title: "Milo -- Day 2: Shadows"
logline: >-
  Late morning. The sun is higher and a crisp dark mint shadow has
  appeared on the grass beside Milo. Pip points at it. He tries to
  befriend it the alien way; it refuses to play along. He stops
  showing off, holds one clean pose, and the shadow falls perfectly
  into sync with him -- a friend made of his own shape.
aspect_ratio: "16:9"
resolution: "720p"

# Cross-episode chain. Shot 01 seeds from Day 1's hand-off frame
# (shot 06): clean stable wide shot of Milo alone in default form on
# the lawn beside the kiddie pool, magazine on the grass beside him,
# bright pale blue mid-morning sky, sliding door shut. We continue
# from that frame later the same morning -- the sun has climbed and
# now casts a clean directional shadow on the lawn beside Milo for
# the first time.
prev_episode: day-001-patience
handoff_scene: "06"

music:
  track: satie-gymnopedie-1
  volume_db: -2
  fade_in_s: 1.5
  fade_out_s: 3.0

# Operational metadata for the writers' room (not read by the runner).
day: 2
weekday: Tue
bucket: how-things-work
concept: Shadows
form_drift_state: >-
  Default mint-green teardrop, no drift yet -- second daily episode,
  drift schedule begins at Day 10.

scenes:

  # ============ COLD OPEN ============
  # Time has passed; sun is higher. A clean cast shadow appears on
  # the lawn beside Milo for the first time. He notices it.

  - id: "01"
    mode: image
    image_from: "_prev_episode"
    duration: 10
    prompt: >-
      Later that morning. Same suburban backyard, same kiddie pool,
      gnome, picket fence, beige house with sliding door shut. Sky
      has shifted from pale mid-morning to bright late-morning blue,
      sun higher and strongly directional from the upper right,
      casting clean hard shadows. MILO sits on the lawn beside the
      kiddie pool in his default form (mint-green teardrop, two
      wobbly antennae, one large expressive eye, NO MOUTH, no
      drift), exactly where the morning left him. The 'HOW TO BE
      HUMAN (SORT OF)' magazine still lies open on the grass beside
      him. For the first time a CRISP DARK MINT SHADOW of MILO is
      cast cleanly on the lawn to his left, slightly elongated -- a
      flat dark teardrop silhouette with two flat antennae and one
      flat round darker eye, mirroring his pose. MILO turns his big
      eye DOWN toward the shadow and gives one slow blink and a
      small antenna-twitch as he notices it. MOUTH STAYS CLOSED.
      Medium shot, camera locked. NO HUMANS IN FRAME.
    audio: >-
      Late-morning suburban ambience: birds chirping softly, a faint
      sprinkler ticking far off, a gentle breeze rustling grass.
      NO VOICES. NO DIALOGUE.

  # ============ CONCEPT HOOK ============
  # Pip arrives on the patio, sealed on her straw, and points one
  # finger DOWN at the shadow. ?-bubble over Milo.

  - id: "02"
    mode: image
    image_from: "01"
    duration: 10
    prompt: >-
      Same backyard, same late-morning light, same crisp dark mint
      shadow of MILO on the lawn beside him. Camera widens slightly
      to include the patio. Sliding glass door now fully OPEN. PIP
      stands on the patio in a clean stable pose: brown ponytail,
      striped pastel t-shirt, denim shorts, bare feet, deadpan
      half-lidded eyes, MOUTH SEALED ON THE BENDY STRAW of her juice
      box in her right hand. With her free left hand she points one
      extended index finger DOWN toward the shadow on the grass
      beside MILO, holds, then lowers her hand. PIP'S MOUTH STAYS
      SEALED ON THE STRAW. MILO turns his big eye down to look at
      the shadow. A small mint-green cartoon thought-bubble pops
      above MILO's head containing a bold black '?', holds one
      beat, then fades. MILO'S MOUTH STAYS CLOSED. Wide two-shot.
      The shadow has not moved.
    audio: >-
      Birds chirping softly. Distant sprinkler. A long slow
      juice-box slurp from PIP through her sealed straw (~3 s). A
      faint fabric rustle as PIP raises her arm. A tiny soft cartoon
      'pop' as the ? bubble appears. NO VOICES. NO DIALOGUE.

  # ============ WRONG ATTEMPT ============
  # Milo leans sideways toward the shadow in a big cartoon "hello".
  # The shadow stays in default teardrop. The mismatch is the joke.

  - id: "03"
    mode: image
    image_from: "02"
    duration: 12
    prompt: >-
      Same backyard, same late-morning light, same wide two-shot.
      MILO tries to greet the shadow as if it were another being:
      his entire teardrop body leans dramatically SIDEWAYS toward
      the shadow on the grass to his left, curved into a long
      sideways crescent, his right antenna stretched out long and
      elastic in a wide cartoon 'hello' arc reaching down toward
      the shadow's antenna. His one big eye is wide and earnest.
      But the dark mint shadow on the grass does NOT mirror this --
      it is still the original upright default teardrop from shot
      01, perfectly still, refusing to copy his contortion. The
      visible mismatch between MILO's crescent body and the
      unchanged upright shadow is the gag. MILO'S MOUTH STAYS
      CLOSED. PIP stands motionless on the patio, juice box paused
      at her side, MOUTH STILL SEALED ON THE STRAW, one deadpan
      eyebrow raised half a millimetre. World stays solid.
    audio: >-
      A long elastic cartoon 'boooing!' as MILO's body leans
      sideways and his antenna stretches. A soft 'shhk' of grass
      under his base. Birds chirping. NO VOICES. NO DIALOGUE.

  # ============ BECOMES THE CONCEPT ============
  # Milo snaps back to default and holds ONE clean salute pose --
  # right antenna raised straight up. The shadow now mirrors him
  # perfectly. Single sustained mirrored pose.

  - id: "04"
    mode: image
    image_from: "03"
    duration: 14
    prompt: >-
      Same backyard, same late-morning light, same wide two-shot.
      MILO has snapped back from his sideways crescent into his
      default teardrop on the lawn beside the kiddie pool, and now
      holds ONE clean simple pose: his right antenna raised
      straight up vertical in a clear semaphore salute, his left
      antenna neutral, his one big eye open and steady, his body
      perfectly still. The DARK MINT SHADOW on the grass beside
      him now MIRRORS HIS POSE EXACTLY: a flat dark teardrop with
      one flat antenna raised straight up, one flat antenna
      neutral, one flat round darker eye -- perfectly synced. The
      two shapes are locked in identical pose. This single
      sustained mirrored pose is the entire shot; nothing else
      moves. No after-images. No glow. No shimmer. The grass stays
      solid green. MILO'S MOUTH STAYS CLOSED. PIP stands motionless
      on the patio, juice box paused at her side, MOUTH SEALED ON
      THE STRAW.
    audio: >-
      Late-morning suburban ambience: birds, soft breeze, faint
      sprinkler. A very soft cartoon 'click' as the shadow falls
      into matching pose with MILO (a tiny crisp click,
      quarter-second). NO VOICES. NO DIALOGUE.

  # ============ QUIET PAYOFF ============
  # Milo settles. Heart bubble. Pip walks back into the house and
  # the door closes -- critical so shot 06's seed is clean.

  - id: "05"
    mode: image
    image_from: "04"
    duration: 8
    prompt: >-
      Same backyard, same late-morning light. MILO lowers his raised
      antenna and settles fully back into default teardrop on the
      lawn. The dark mint shadow beside him lowers its antenna in
      perfect sync. A small mint-green cartoon thought-bubble pops
      above MILO's head containing a bright red heart '❤️', holds
      two beats, then fades gently. MILO'S MOUTH STAYS CLOSED. PIP,
      who has been motionless on the patio, turns calmly and walks
      fully INTO the house through the open sliding glass door. The
      door then rumbles slowly CLOSED behind her until fully shut.
      By the end of this shot the patio is COMPLETELY EMPTY: no
      Pip, no ponytail, no heel, no juice box visible anywhere. The
      closed sliding door is plain dark glass reflecting the sky.
      The shadow remains beside MILO in default-teardrop pose.
    audio: >-
      A faint mint shimmer as MILO settles. A tiny soft cartoon
      'pop' as the heart bubble appears. Bare feet padding softly
      on patio tile, then the sliding glass door rumbling slowly
      closed and clicking shut. Birds chirping. NO VOICES. NO
      DIALOGUE.

  # ============ HAND-OFF FRAME (seed for Day 3) ============

  - id: "06"
    mode: image
    image_from: "05"
    duration: 8
    prompt: >-
      Same backyard. Camera pulls back to a clean stable wide shot.
      Time of day: late morning, just before noon. Sky is bright
      pale blue with a few small cumulus clouds, sun high from the
      upper right casting clean directional light. Sliding glass
      door fully shut, plain dark glass reflecting the sky, no
      figure visible behind it. MILO sits quietly in his default
      form (mint-green teardrop, two wobbly antennae, one large
      expressive eye, NO MOUTH, no drift) on the lawn beside the
      kiddie pool, perfectly still, content. MOUTH CLOSED. The
      'HOW TO BE HUMAN (SORT OF)' magazine lies open on the grass
      beside him. A CRISP DARK MINT SHADOW of MILO lies cleanly on
      the grass to his left, in matching default-teardrop pose,
      both antennae neutral. Picket fence, gnome, lawn chair,
      kiddie pool all in their usual places. Camera locked. Only
      movement: a single small white butterfly drifting slowly left
      to right above the lawn. PIP IS NOT IN FRAME ANYWHERE. Only
      MILO, his shadow, and the props.
    audio: >-
      Late-morning suburban ambience: birds chirping softly, a
      distant sprinkler, a very soft breeze. NO VOICES. NO
      DIALOGUE.
